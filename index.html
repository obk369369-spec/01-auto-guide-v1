<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1번 고객 자동화 안내서 - 좌표 고정형</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f8;
      color: #222;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 12px;
      padding: 12px;
    }
    .panel, .preview-wrap {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
    }
    .panel h2, .preview-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }
    .field select, .field textarea, .field input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    .field textarea {
      min-height: 84px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      border: 1px solid #c8cfdb;
      background: #1f6feb;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .btn.secondary {
      background: #fff;
      color: #1f2937;
    }
    .btn.small {
      padding: 4px 8px;
      font-size: 11px;
    }
    .hint {
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid #c8cfdb;
      background: #fff;
      color: #1f2937;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .tab-btn.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .stage {
      background: #eef2f7;
      border-radius: 10px;
      padding: 16px;
    }

    .guide-host {
      width: 700px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d5dbe6;
    }

    .guide-canvas {
      position: relative;
      width: 599px;
      height: 871px;
      margin: 0 auto;
      background: #fff;
      overflow: hidden;
    }
    .guide-canvas img.template {
      position: absolute;
      inset: 0;
      width: 599px;
      height: 871px;
      z-index: 1;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .text-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    .slot {
      position: absolute;
      color: #111;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.25;
    }

    .slot.receiver {
      font-size: 15px;
      font-weight: 700;
    }
    .slot.meta {
      font-size: 11px;
    }
    .slot.title-en {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.22;
    }
    .slot.title-ko {
      font-size: 11px;
      line-height: 1.32;
    }
    .slot.toc {
      font-size: 10px;
      line-height: 1.28;
    }
    .slot.link {
      font-size: 11px;
      line-height: 1.25;
      color: #1d4ed8;
      text-decoration: underline;
      word-break: break-all;
    }

    .debug-wrap {
      margin-top: 12px;
    }
    .debug-card {
      border: 1px solid #d8dde6;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fbfcfe;
    }
    .debug-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .area-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ccd5e2;
      background: #f7f9fc;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ead08b;
      background: #fff8e8;
      color: #8b5a00;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .copy-box {
      background: #0f172a;
      color: #d7e0ea;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.45;
      margin-top: 8px;
    }

    .compare-stage {
      position: relative;
      width: 599px;
      height: 871px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d5dbe6;
      overflow: visible;
    }
    .compare-stage img.origin {
      position: absolute;
      inset: 0;
      width: 599px;
      height: 871px;
      z-index: 1;
      opacity: 0.55;
      pointer-events: none;
      display: block;
    }
    .compare-stage .generated {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.82;
      pointer-events: none;
    }
    .overlay-root {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .overlay-box {
      position: absolute;
      border: 2px solid rgba(239, 68, 68, 0.92);
      background: rgba(239, 68, 68, 0.06);
      border-radius: 6px;
      pointer-events: auto;
    }
    .overlay-label {
      position: absolute;
      top: -24px;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      pointer-events: auto;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h2>좌표 고정형 안내서</h2>

      <div class="btn-row">
        <button id="runBtn" class="btn">정리/실행</button>
        <button id="sampleBtn" class="btn secondary">샘플 넣기</button>
        <button id="copyImageBtn" class="btn">메일용 안내서 이미지 복사</button>
        <button id="downloadPngBtn" class="btn secondary">PNG 저장</button>
      </div>

      <div class="field">
        <label for="customerSelect">고객 선택</label>
        <select id="customerSelect">
          <option value="kric">한국화학연구원 / 광에너지연구센터</option>
          <option value="kimm">한국기계연구원 / 친환경에너지기계연구실</option>
        </select>
      </div>

      <div class="field">
        <label for="titleEn">영문 제목</label>
        <textarea id="titleEn"></textarea>
      </div>

      <div class="field">
        <label for="titleKo">한글 제목</label>
        <textarea id="titleKo"></textarea>
      </div>

      <div class="field">
        <label for="publisher">발행사</label>
        <input id="publisher" />
      </div>

      <div class="field">
        <label for="pages">페이지</label>
        <input id="pages" />
      </div>

      <div class="field">
        <label for="price">정가</label>
        <input id="price" />
      </div>

      <div class="field">
        <label for="publishDate">발행일</label>
        <input id="publishDate" />
      </div>

      <div class="field">
        <label for="pdfType">PDF 표기</label>
        <input id="pdfType" />
      </div>

      <div class="field">
        <label for="supplyPrice">공급가격</label>
        <input id="supplyPrice" />
      </div>

      <div class="field">
        <label for="reportLink">보고서 링크</label>
        <input id="reportLink" />
      </div>

      <div class="field">
        <label for="tocText">본문 / 목차</label>
        <textarea id="tocText"></textarea>
      </div>

      <div class="hint">
        이 버전은 틀을 다시 그리지 않고 <strong>original-guide.png</strong> 위에 텍스트만 좌표 고정으로 올립니다.<br>
        메일 발송은 안내서 전체를 이미지로 복사하는 방식입니다.
      </div>
    </div>

    <div class="preview-wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="renderTab">생성 화면</button>
        <button class="tab-btn" data-tab="debugTab">오류 화면</button>
      </div>

      <div id="renderTab" class="tab-pane active">
        <div class="preview-title">생성 화면</div>
        <div class="stage">
          <div class="guide-host">
            <div id="guideCanvas" class="guide-canvas"></div>
          </div>
        </div>
      </div>

      <div id="debugTab" class="tab-pane">
        <div class="preview-title">원본 겹침 비교 + 정밀 분류체계</div>
        <div class="stage">
          <div class="compare-stage">
            <img class="origin" src="./original-guide.png" alt="원본 안내서" />
            <div id="compareGenerated" class="generated"></div>
            <div id="overlayRoot" class="overlay-root"></div>
          </div>
        </div>
        <div id="debugRoot" class="debug-wrap"></div>
      </div>
    </div>
  </div>

  <script>
    const W = 599;
    const H = 871;

    const customers = {
      kric: { orgName: "한국화학연구원", deptName: "광에너지연구센터" },
      kimm: { orgName: "한국기계연구원", deptName: "친환경에너지기계연구실" }
    };

    const sample = {
      customerKey: "kric",
      titleEn: "2026-2031 Global Biocarbon Outlook Market Size, Share & Trends Analysis Report By Player, Type, Application and Region Enhanced Version.",
      titleKo: "(글로벌 바이오 카본 시장 전망 보고서 2026-2031년: 시장 규모, 점유율 및 트렌드 분석 (플레이어, 유형, 응용 분야 및 지역별 향상 버전))",
      publisher: "HNY Research",
      pages: "125 Pages",
      price: "$ 5,000",
      publishDate: "2026년 01월 02일",
      pdfType: "PDF",
      supplyPrice: "7,400,000원",
      reportLink: "https://www.hnyresearch.com/report/2026-2031-Global-Biocarbon-Outlook-Market-Size-Share-Trends-Analysis-Report-By-Player-Type-Application-and-Region-Enhanced-Version/3484731",
      tocText:
`Report Overview
Market Competition by Manufacturers
Biocarbon Regional Market Analysis
Biocarbon Sales Market by Type (2020-2031)
5.1. Global Biocarbon Historic Market Size by Type (2020-2025)
5.2. Global Biocarbon Forecasted Market Size by Type (2026-2031)
Biocarbon Consumption Market by Application (2020-2031)
6.1. Global Biocarbon Historic Market Size by Application (2020-2025)
6.2. Global Biocarbon Forecasted Market Size by Application (2026-2031)
Company Profiles and Key Figures in Biocarbon Business
Production and Supply Forecast
8.1. Global Forecasted Production of Biocarbon (2026-2031)`
    };

    // 정밀 좌표 잠금
    const SLOTS = {
      "HEADER.LEFT.BOX":            { x: 12,  y: 11,  w: 282, h: 71 },
      "HEADER.RIGHT.BOX":           { x: 294, y: 11,  w: 293, h: 71 },

      "RECEIVER.LINE":              { x: 17,  y: 98,  w: 548, h: 21 },

      "META.LEFT.TEXT.PUBLISHER":   { x: 32,  y: 149, w: 166, h: 16 },
      "META.LEFT.TEXT.DATE":        { x: 32,  y: 170, w: 166, h: 16 },

      "META.CENTER.TEXT.PAGES":     { x: 286, y: 146, w: 84,  h: 18 },
      "META.CENTER.TEXT.PDF":       { x: 286, y: 168, w: 84,  h: 18 },

      "META.RIGHT.TEXT.PRICE":      { x: 428, y: 146, w: 114, h: 18 },
      "META.RIGHT.TEXT.SUPPLY":     { x: 428, y: 168, w: 114, h: 18 },

      "LINK.TEXT":                  { x: 42,  y: 218, w: 495, h: 34 },

      "TITLE.EN":                   { x: 34,  y: 303, w: 502, h: 55 },
      "TITLE.KO":                   { x: 34,  y: 362, w: 502, h: 33 },
      "TOC.TEXT":                   { x: 34,  y: 423, w: 506, h: 183 }
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getData() {
      const customerKey = document.getElementById("customerSelect").value;
      const customer = customers[customerKey];
      return {
        receiver: `( ${customer.orgName} ) ${customer.deptName}`,
        titleEn: document.getElementById("titleEn").value.trim(),
        titleKo: document.getElementById("titleKo").value.trim(),
        publisher: document.getElementById("publisher").value.trim(),
        pages: document.getElementById("pages").value.trim(),
        price: document.getElementById("price").value.trim(),
        publishDate: document.getElementById("publishDate").value.trim(),
        pdfType: document.getElementById("pdfType").value.trim(),
        supplyPrice: document.getElementById("supplyPrice").value.trim(),
        reportLink: document.getElementById("reportLink").value.trim(),
        tocText: document.getElementById("tocText").value.trim()
      };
    }

    function slotDiv(cls, rect, text, extraStyle = "") {
      return `
        <div class="slot ${cls}" style="
          left:${rect.x}px; top:${rect.y}px; width:${rect.w}px; height:${rect.h}px;
          ${extraStyle}
        ">${text}</div>
      `;
    }

    function buildGuideLayerHTML(data) {
      const linkText = data.reportLink;
      return `
        <img class="template" src="./original-guide.png" alt="안내서 원본 틀">
        <div class="text-layer">
          ${slotDiv("receiver", SLOTS["RECEIVER.LINE"], escapeHtml(data.receiver))}
          ${slotDiv("meta", SLOTS["META.LEFT.TEXT.PUBLISHER"], "◇ 발행사: " + escapeHtml(data.publisher))}
          ${slotDiv("meta", SLOTS["META.LEFT.TEXT.DATE"], "◇ 발행일: " + escapeHtml(data.publishDate))}
          ${slotDiv("meta", SLOTS["META.CENTER.TEXT.PAGES"], escapeHtml(data.pages), "text-align:center;")}
          ${slotDiv("meta", SLOTS["META.CENTER.TEXT.PDF"], escapeHtml(data.pdfType), "text-align:center;")}
          ${slotDiv("meta", SLOTS["META.RIGHT.TEXT.PRICE"], "◇ 정가: " + escapeHtml(data.price))}
          ${slotDiv("meta", SLOTS["META.RIGHT.TEXT.SUPPLY"], "◆ 공급가격: " + escapeHtml(data.supplyPrice))}
          ${slotDiv("link", SLOTS["LINK.TEXT"], escapeHtml(linkText))}
          ${slotDiv("title-en", SLOTS["TITLE.EN"], escapeHtml(data.titleEn))}
          ${slotDiv("title-ko", SLOTS["TITLE.KO"], escapeHtml(data.titleKo))}
          ${slotDiv("toc", SLOTS["TOC.TEXT"], escapeHtml(data.tocText))}
        </div>
      `;
    }

    function buildDebugItems(data) {
      return [
        { title: "HEADER.LEFT.BOX", area: "T1/S1/C3/W1/HEADER.LEFT.BOX", code: "HEADER.LEFT.BOX", status: "LOCKED_COORD", value: JSON.stringify(SLOTS["HEADER.LEFT.BOX"]) },
        { title: "HEADER.RIGHT.BOX", area: "T1/S1/C3/W1/HEADER.RIGHT.BOX", code: "HEADER.RIGHT.BOX", status: "LOCKED_COORD", value: JSON.stringify(SLOTS["HEADER.RIGHT.BOX"]) },
        { title: "RECEIVER.LINE", area: "T1/S1/C3/W1/RECEIVER.LINE", code: "RECEIVER.LINE", status: "LOCKED_COORD", value: data.receiver },
        { title: "META.LEFT.TEXT.PUBLISHER", area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER", code: "META.LEFT.TEXT.PUBLISHER", status: "LOCKED_COORD", value: data.publisher },
        { title: "META.CENTER.TEXT.PAGES", area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES", code: "META.CENTER.TEXT.PAGES", status: "LOCKED_COORD", value: data.pages },
        { title: "META.RIGHT.TEXT.PRICE", area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE", code: "META.RIGHT.TEXT.PRICE", status: "LOCKED_COORD", value: data.price },
        { title: "LINK.TEXT", area: "T1/S1/C3/W1/LINK.TEXT", code: "LINK.TEXT", status: "LOCKED_COORD", value: data.reportLink },
        { title: "TITLE.EN", area: "T1/S1/C3/W1/TITLE.EN", code: "TITLE.EN", status: "LOCKED_COORD", value: data.titleEn },
        { title: "TITLE.KO", area: "T1/S1/C3/W1/TITLE.KO", code: "TITLE.KO", status: "LOCKED_COORD", value: data.titleKo },
        { title: "TOC.TEXT", area: "T1/S1/C3/W1/TOC.TEXT", code: "TOC.TEXT", status: "LOCKED_COORD", value: data.tocText.split("\n")[0] || "" }
      ];
    }

    function buildDebugText(item) {
      return `분류코드: ${item.code}\n위치: ${item.area}\n상태: ${item.status}\n현재값: ${item.value}`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("복사 완료");
      } catch (e) {
        alert(text);
      }
    }

    async function copyDebug(index) {
      const item = window.__debugItems[index];
      if (!item) return;
      await copyText(buildDebugText(item));
    }
    window.copyDebug = copyDebug;

    async function copyOverlay(area, title, rect) {
      await copyText(`위치 식별자: ${area}\n구역명: ${title}\n좌표: x=${rect.x}, y=${rect.y}, w=${rect.w}, h=${rect.h}\n최근 동작: 정리/실행`);
    }
    window.copyOverlay = copyOverlay;

    function renderDebug(data) {
      const items = buildDebugItems(data);
      window.__debugItems = items;

      document.getElementById("debugRoot").innerHTML = items.map((item, idx) => `
        <div class="debug-card">
          <div class="debug-top">
            <div>
              <strong>${escapeHtml(item.title)}</strong><br>
              <span class="area-badge">${escapeHtml(item.area)}</span>
              <span class="status-badge">${item.status}</span>
            </div>
            <button class="btn secondary small" onclick="copyDebug(${idx})">복사</button>
          </div>
          <div>분류코드: ${escapeHtml(item.code)}</div>
          <div>현재값: ${escapeHtml(item.value)}</div>
          <div class="copy-box">${escapeHtml(buildDebugText(item))}</div>
        </div>
      `).join("");

      const overlayItems = [
        { title: "HEADER.LEFT.BOX", area: "T1/S1/C3/W1/HEADER.LEFT.BOX", rect: SLOTS["HEADER.LEFT.BOX"] },
        { title: "HEADER.RIGHT.BOX", area: "T1/S1/C3/W1/HEADER.RIGHT.BOX", rect: SLOTS["HEADER.RIGHT.BOX"] },
        { title: "RECEIVER.LINE", area: "T1/S1/C3/W1/RECEIVER.LINE", rect: SLOTS["RECEIVER.LINE"] },
        { title: "META.LEFT.TEXT.PUBLISHER", area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER", rect: { x: 26, y: 140, w: 188, h: 54 } },
        { title: "META.CENTER.TEXT.PAGES", area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES", rect: { x: 270, y: 140, w: 104, h: 54 } },
        { title: "META.RIGHT.TEXT.PRICE", area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE", rect: { x: 418, y: 140, w: 126, h: 54 } },
        { title: "LINK.TEXT", area: "T1/S1/C3/W1/LINK.TEXT", rect: SLOTS["LINK.TEXT"] },
        { title: "TITLE.EN", area: "T1/S1/C3/W1/TITLE.EN", rect: SLOTS["TITLE.EN"] },
        { title: "TITLE.KO", area: "T1/S1/C3/W1/TITLE.KO", rect: SLOTS["TITLE.KO"] },
        { title: "TOC.TEXT", area: "T1/S1/C3/W1/TOC.TEXT", rect: SLOTS["TOC.TEXT"] }
      ];

      document.getElementById("overlayRoot").innerHTML = overlayItems.map(o => `
        <div class="overlay-box" style="left:${o.rect.x}px; top:${o.rect.y}px; width:${o.rect.w}px; height:${o.rect.h}px;">
          <div class="overlay-label">
            <span class="area-badge">${o.area}</span>
            <span class="status-badge">${o.title}</span>
            <button class="btn secondary small" onclick='copyOverlay("${o.area}","${o.title}",${JSON.stringify(o.rect)})'>복사</button>
          </div>
        </div>
      `).join("");
    }

    function renderAll() {
      const data = getData();
      const guideHtml = buildGuideLayerHTML(data);
      document.getElementById("guideCanvas").innerHTML = guideHtml;
      document.getElementById("compareGenerated").innerHTML = `<div class="guide-canvas">${guideHtml}</div>`;
      renderDebug(data);
    }

    function fillSample() {
      document.getElementById("customerSelect").value = sample.customerKey;
      document.getElementById("titleEn").value = sample.titleEn;
      document.getElementById("titleKo").value = sample.titleKo;
      document.getElementById("publisher").value = sample.publisher;
      document.getElementById("pages").value = sample.pages;
      document.getElementById("price").value = sample.price;
      document.getElementById("publishDate").value = sample.publishDate;
      document.getElementById("pdfType").value = sample.pdfType;
      document.getElementById("supplyPrice").value = sample.supplyPrice;
      document.getElementById("reportLink").value = sample.reportLink;
      document.getElementById("tocText").value = sample.tocText;
      renderAll();
    }

    async function buildPngBlob() {
      const data = getData();
      const templateUrl = new URL("./original-guide.png", location.href).href;

      const svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
  <image href="${templateUrl}" x="0" y="0" width="${W}" height="${H}" />
  <style>
    .t { font-family: Arial, sans-serif; fill: #111; }
    .receiver { font-size: 15px; font-weight: 700; }
    .meta { font-size: 11px; }
    .titleEn { font-size: 18px; font-weight: 700; }
    .titleKo { font-size: 11px; }
    .toc { font-size: 10px; }
    .link { font-size: 11px; fill: #1d4ed8; text-decoration: underline; }
  </style>

  <foreignObject x="${SLOTS["RECEIVER.LINE"].x}" y="${SLOTS["RECEIVER.LINE"].y}" width="${SLOTS["RECEIVER.LINE"].w}" height="${SLOTS["RECEIVER.LINE"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:700 15px Arial; color:#111; line-height:1.25;">${escapeHtml(data.receiver)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["META.LEFT.TEXT.PUBLISHER"].x}" y="${SLOTS["META.LEFT.TEXT.PUBLISHER"].y}" width="${SLOTS["META.LEFT.TEXT.PUBLISHER"].w}" height="${SLOTS["META.LEFT.TEXT.PUBLISHER"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111;">◇ 발행사: ${escapeHtml(data.publisher)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["META.LEFT.TEXT.DATE"].x}" y="${SLOTS["META.LEFT.TEXT.DATE"].y}" width="${SLOTS["META.LEFT.TEXT.DATE"].w}" height="${SLOTS["META.LEFT.TEXT.DATE"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111;">◇ 발행일: ${escapeHtml(data.publishDate)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["META.CENTER.TEXT.PAGES"].x}" y="${SLOTS["META.CENTER.TEXT.PAGES"].y}" width="${SLOTS["META.CENTER.TEXT.PAGES"].w}" height="${SLOTS["META.CENTER.TEXT.PAGES"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111; text-align:center;">${escapeHtml(data.pages)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["META.CENTER.TEXT.PDF"].x}" y="${SLOTS["META.CENTER.TEXT.PDF"].y}" width="${SLOTS["META.CENTER.TEXT.PDF"].w}" height="${SLOTS["META.CENTER.TEXT.PDF"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111; text-align:center;">${escapeHtml(data.pdfType)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["META.RIGHT.TEXT.PRICE"].x}" y="${SLOTS["META.RIGHT.TEXT.PRICE"].y}" width="${SLOTS["META.RIGHT.TEXT.PRICE"].w}" height="${SLOTS["META.RIGHT.TEXT.PRICE"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111;">◇ 정가: ${escapeHtml(data.price)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["META.RIGHT.TEXT.SUPPLY"].x}" y="${SLOTS["META.RIGHT.TEXT.SUPPLY"].y}" width="${SLOTS["META.RIGHT.TEXT.SUPPLY"].w}" height="${SLOTS["META.RIGHT.TEXT.SUPPLY"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111;">◆ 공급가격: ${escapeHtml(data.supplyPrice)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["LINK.TEXT"].x}" y="${SLOTS["LINK.TEXT"].y}" width="${SLOTS["LINK.TEXT"].w}" height="${SLOTS["LINK.TEXT"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#1d4ed8; text-decoration:underline; word-break:break-all; line-height:1.25;">${escapeHtml(data.reportLink)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["TITLE.EN"].x}" y="${SLOTS["TITLE.EN"].y}" width="${SLOTS["TITLE.EN"].w}" height="${SLOTS["TITLE.EN"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:700 18px Arial; color:#111; line-height:1.22;">${escapeHtml(data.titleEn)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["TITLE.KO"].x}" y="${SLOTS["TITLE.KO"].y}" width="${SLOTS["TITLE.KO"].w}" height="${SLOTS["TITLE.KO"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:11px Arial; color:#111; line-height:1.32;">${escapeHtml(data.titleKo)}</div>
  </foreignObject>

  <foreignObject x="${SLOTS["TOC.TEXT"].x}" y="${SLOTS["TOC.TEXT"].y}" width="${SLOTS["TOC.TEXT"].w}" height="${SLOTS["TOC.TEXT"].h}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font:10px Arial; color:#111; white-space:pre-wrap; line-height:1.28;">${escapeHtml(data.tocText)}</div>
  </foreignObject>
</svg>`;

      const svgBlob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
      const svgUrl = URL.createObjectURL(svgBlob);

      const img = new Image();
      img.crossOrigin = "anonymous";

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = svgUrl;
      });

      const canvas = document.createElement("canvas");
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      URL.revokeObjectURL(svgUrl);

      return await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    async function copyGuideImage() {
      try {
        const pngBlob = await buildPngBlob();
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": pngBlob })
        ]);
        alert("메일용 안내서 이미지 복사 완료");
      } catch (e) {
        alert("이미지 복사 실패");
      }
    }

    async function downloadPng() {
      try {
        const pngBlob = await buildPngBlob();
        const url = URL.createObjectURL(pngBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "guide-mail-image.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert("PNG 저장 실패");
      }
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.getElementById("runBtn").addEventListener("click", renderAll);
    document.getElementById("sampleBtn").addEventListener("click", fillSample);
    document.getElementById("copyImageBtn").addEventListener("click", copyGuideImage);
    document.getElementById("downloadPngBtn").addEventListener("click", downloadPng);

    fillSample();
  </script>
</body>
</html>
