<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1번 고객 자동화 안내서 - 통합 잠금판 v6</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, "Malgun Gothic", sans-serif; background:#f5f6f8; color:#111; }
    .app { padding:16px; }
    .topbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    .title { font-size:22px; font-weight:700; margin-right:auto; }
    .btn, .file-btn {
      border:1px solid #cfd5de; background:#fff; padding:10px 14px; border-radius:12px;
      cursor:pointer; font-size:14px; font-weight:700;
    }
    .btn.primary { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
    .btn.green { background:#15803d; color:#fff; border-color:#15803d; }
    input[type=file] { display:none; }
    .layout { display:grid; grid-template-columns: 360px 1fr; gap:12px; }
    .panel { background:#fff; border:1px solid #d7dce4; border-radius:16px; overflow:hidden; }
    .panel-head { padding:16px; font-size:16px; font-weight:700; border-bottom:1px solid #e6e9ef; }
    .panel-body { padding:16px; }
    .field { margin-bottom:10px; }
    .field label { display:block; font-size:12px; font-weight:700; margin-bottom:4px; }
    .field input, .field textarea {
      width:100%; padding:8px 10px; border:1px solid #cfd5de; border-radius:10px; font-size:13px;
      font-family:inherit;
    }
    .field textarea { min-height:68px; resize:vertical; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .status {
      margin-top:14px; padding:12px; border:1px solid #e5e7eb; background:#fafafa; border-radius:12px;
      white-space:pre-line; font-size:13px; min-height:125px;
    }
    .meta { margin-top:12px; font-size:13px; line-height:1.6; white-space:pre-line; word-break:break-all; }
    .progress-wrap { margin-top:12px; }
    .progress-title { font-size:12px; font-weight:700; margin-bottom:6px; }
    .progress-bar { width:100%; height:16px; background:#e5e7eb; border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; width:0%; background:#1d4ed8; transition:width .2s; }
    .progress-text { margin-top:6px; font-size:12px; color:#444; white-space:pre-line; }
    .tabs { display:flex; border-bottom:1px solid #e5e7eb; background:#fafafa; }
    .tab { border:0; background:transparent; padding:12px 18px; font-size:14px; font-weight:700; cursor:pointer; border-right:1px solid #eceff4; }
    .tab.active { background:#fff; }
    .tabpane { display:none; padding:12px; }
    .tabpane.active { display:block; }
    .frame-wrap { border:1px solid #cfd5de; border-radius:12px; overflow:hidden; background:#fff; }
    iframe { width:100%; height:920px; border:0; background:#fff; }
    .logbox {
      min-height:920px; border:1px solid #d7dce4; border-radius:12px; padding:16px; background:#fff;
      white-space:pre-wrap; font-family: Consolas, monospace; font-size:13px; line-height:1.5;
    }
    .small { font-size:12px; color:#555; line-height:1.6; }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">1번 고객 자동화 안내서 - 통합 잠금판</div>
    <label class="file-btn" for="htmlFile">안내서 HTML 선택</label>
    <input id="htmlFile" type="file" accept=".htm,.html" />
    <label class="file-btn" for="logoFile">로고 선택</label>
    <input id="logoFile" type="file" accept=".png,.jpg,.jpeg,.gif,.bmp,.webp,.svg" />
    <button class="btn primary" id="applyBtn">오른쪽 전체 적용</button>
    <button class="btn primary" id="copyBtn">복사화면 전체 복사</button>
    <button class="btn green" id="saveBtn">안정화 HTML 저장</button>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="panel-head">왼쪽 메뉴</div>
      <div class="panel-body">
        <div class="field"><label>수신처</label><input id="fReceiver" placeholder="예: 한국화학연구원 감염병예방진단기술연구센터"></div>
        <div class="field"><label>제목</label><textarea id="fTitle" placeholder="예: Global Infectious Disease Diagnostics Market Report 2026"></textarea></div>
        <div class="field"><label>발행사</label><input id="fPublisher" placeholder="예: Example Research"></div>
        <div class="row2">
          <div class="field"><label>발행일</label><input id="fDate" placeholder="예: 2026-02-18"></div>
          <div class="field"><label>페이지/PDF</label><input id="fPages" placeholder="예: 240 Pages / PDF"></div>
        </div>
        <div class="row2">
          <div class="field"><label>정가</label><input id="fPrice" placeholder="예: USD 4,950"></div>
          <div class="field"><label>공급가격</label><input id="fSupply" placeholder="예: 별도 문의"></div>
        </div>
        <div class="field"><label>링크 주소</label><input id="fLinkUrl" placeholder="https://example.com/report-link"></div>
        <div class="field"><label>링크 문구</label><input id="fLinkText" value="바로가기"></div>

        <div class="progress-wrap">
          <div class="progress-title">진행바</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">대기 중</div>
        </div>

        <div class="status" id="statusBox">대기 중</div>
        <div class="meta" id="metaBox">기준 HTML: 기본 내장 원본
로고: 없음
자동복원: 켜짐</div>

        <div class="small">사용 순서: 안내서 HTML 선택(선택) → 로고 선택(선택) → 오른쪽 전체 적용
입력값은 자동 복원되고, 적용 결과도 다시 열면 그대로 복원된다.</div>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="identify">식별화면</button>
        <button class="tab" data-tab="preview">미리보기화면</button>
        <button class="tab" data-tab="copy">복사화면</button>
        <button class="tab" data-tab="log">진단/판단코어 로그</button>
      </div>
      <div class="tabpane active" id="pane-identify"><div class="frame-wrap"><iframe id="identifyFrame"></iframe></div></div>
      <div class="tabpane" id="pane-preview"><div class="frame-wrap"><iframe id="previewFrame"></iframe></div></div>
      <div class="tabpane" id="pane-copy"><div class="frame-wrap"><iframe id="copyFrame"></iframe></div></div>
      <div class="tabpane" id="pane-log"><div class="logbox" id="logBox">로그 대기 중</div></div>
    </div>
  </div>
</div>

function setLog(lines) { logBox.textContent = lines; }
function esc(s) {
  return String(s || '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
async function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function decodeHtmlFile(file) {
  const buffer = await file.arrayBuffer();
  const bytes = new Uint8Array(buffer);
  const asciiHead = new TextDecoder('latin1').decode(bytes.slice(0, 2048));
  let charset = 'utf-8';
  const m = asciiHead.match(/charset\s*=\s*["']?\s*([A-Za-z0-9_\-]+)/i);
  if (m) charset = m[1].toLowerCase();
  const candidates = [charset, 'euc-kr', 'utf-8', 'windows-1252'];
  for (const enc of candidates) {
    try { return new TextDecoder(enc).decode(bytes); } catch(e) {}
  }
  return new TextDecoder('utf-8').decode(bytes);
}
function cleanOfficeNoise(html) {
  let out = html;
  out = out.replace(/<link[^>]*?File-List[^>]*?>/gi,'');
  out = out.replace(/<link[^>]*?Edit-Time-Data[^>]*?>/gi,'');
  out = out.replace(/<link[^>]*?themeData[^>]*?>/gi,'');
  out = out.replace(/<link[^>]*?colorSchemeMapping[^>]*?>/gi,'');
  out = out.replace(/<meta[^>]*charset=[^>]*>/i, '<meta charset="UTF-8">');
  return out;
}
function saveState() {
  const data = {
    sourceHtml, sourceName, logoDataUrl, logoName, stableHtml,
    fields: Object.fromEntries(Object.entries(fields).map(([k,v]) => [k, v.value]))
  };
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}
function restoreState() {
  const raw = localStorage.getItem(LS_KEY);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    sourceHtml = data.sourceHtml || sourceHtml;
    sourceName = data.sourceName || sourceName;
    logoDataUrl = data.logoDataUrl || '';

function replaceLogo(doc) {
  let replaced = 0;
  if (!logoDataUrl) return replaced;

  const imgs = Array.from(doc.querySelectorAll('img'));
  imgs.forEach(img => {
    img.setAttribute('src', logoDataUrl);
    replaced++;
  });

  const vmlNodes = Array.from(doc.getElementsByTagName('*')).filter(n => /imagedata$/i.test(n.tagName));
  vmlNodes.forEach(node => {
    node.setAttribute('src', logoDataUrl);
    replaced++;
  });

  return replaced;
}
