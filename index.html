<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1번 고객 자동화 안내서 - 동기화 고정판</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #f3f5f8;
      color: #222;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 12px;
      padding: 12px;
    }
    .panel, .preview-wrap {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
    }
    .panel h2, .preview-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }
    .field select, .field textarea, .field input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    .field textarea {
      min-height: 84px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      border: 1px solid #c8cfdb;
      background: #1f6feb;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .btn.secondary {
      background: #fff;
      color: #1f2937;
    }
    .btn.small {
      padding: 4px 8px;
      font-size: 11px;
    }
    .hint {
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
      margin-top: 8px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid #c8cfdb;
      background: #fff;
      color: #1f2937;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .tab-btn.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .stage {
      background: #eef2f7;
      border-radius: 10px;
      padding: 16px;
    }
    .guide-host {
      width: 760px;
      margin: 0 auto;
    }
    .guide-block {
      width: 599px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d5dbe6;
      position: relative;
    }

    .compare-stage {
      position: relative;
      width: 599px;
      height: 871px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d5dbe6;
      overflow: visible;
    }
    .compare-stage img.origin {
      position: absolute;
      inset: 0;
      width: 599px;
      height: 871px;
      object-fit: contain;
      opacity: 1;
      z-index: 1;
      display: block;
      pointer-events: none;
    }

    .overlay-root {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }
    .overlay-box {
      position: absolute;
      border: 2px solid;
      border-radius: 6px;
      pointer-events: auto;
      background: rgba(255,255,255,0.03);
    }
    .overlay-box.locked {
      border-color: rgba(22,163,74,.95);
      background: rgba(22,163,74,.08);
    }
    .overlay-box.hold {
      border-color: rgba(234,179,8,.95);
      background: rgba(234,179,8,.08);
    }
    .overlay-box.manual {
      border-color: rgba(249,115,22,.95);
      background: rgba(249,115,22,.08);
    }
    .overlay-label {
      position: absolute;
      top: -24px;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      pointer-events: auto;
    }
    .area-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ccd5e2;
      background: #f7f9fc;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      border: 1px solid;
    }
    .status-badge.locked {
      background: #ecfdf3;
      border-color: #86efac;
      color: #166534;
    }
    .status-badge.hold {
      background: #fefce8;
      border-color: #fde68a;
      color: #854d0e;
    }
    .status-badge.manual {
      background: #fff7ed;
      border-color: #fdba74;
      color: #9a3412;
    }
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .debug-wrap { margin-top: 12px; }
    .debug-card {
      border: 1px solid #d8dde6;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fbfcfe;
    }
    .debug-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .copy-box {
      background: #0f172a;
      color: #d7e0ea;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.45;
      margin-top: 8px;
    }

    /* 생성/오류 공통 안내서 틀 */
    .mail-guide {
      position: relative;
      width: 599px;
      min-height: 871px;
      background: #fff;
      margin: 0 auto;
      font-family: Arial, "Malgun Gothic", sans-serif;
      color: #111;
    }
    .sheet-frame {
      position: absolute;
      left: 12px;
      top: 11px;
      width: 575px;
      height: 849px;
      border: 1px solid #222;
      background: #fff;
    }

    .header-row {
      position: absolute;
      left: 12px;
      top: 11px;
      width: 575px;
      height: 71px;
      display: flex;
    }
    .header-left {
      width: 282px;
      height: 71px;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .header-right {
      width: 293px;
      height: 71px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 8px;
    }

    .receiver-line {
      position: absolute;
      left: 12px;
      top: 82px;
      width: 575px;
      height: 32px;
      border-top: 1px solid #222;
      border-bottom: 1px solid #999;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 700;
      line-height: 18px;
      display: flex;
      align-items: center;
    }

    .meta-row {
      position: absolute;
      left: 12px;
      top: 114px;
      width: 575px;
      height: 54px;
      border-bottom: 1px solid #999;
      display: flex;
    }
    .meta-left {
      width: 268px;
      height: 54px;
      padding: 6px 10px 4px 12px;
      border-right: 1px solid #999;
      font-size: 11px;
      line-height: 1.35;
    }
    .meta-center {
      width: 108px;
      height: 54px;
      padding: 6px 4px 4px;
      border-right: 1px solid #999;
      text-align: center;
      font-size: 11px;
      line-height: 1.35;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .meta-right {
      width: 199px;
      height: 54px;
      padding: 6px 8px 4px 12px;
      font-size: 11px;
      line-height: 1.35;
    }

    .link-row {
      position: absolute;
      left: 12px;
      top: 168px;
      width: 575px;
      min-height: 48px;
      border-top: 1px solid #999;
      border-bottom: 1px solid #999;
      padding: 6px 12px 6px;
      font-size: 11px;
      line-height: 1.3;
    }
    .link-line-1 {
      margin-bottom: 4px;
    }
    .link-line-2 {
      font-size: 10px;
      color: #444;
      word-break: break-all;
      padding-left: 2px;
    }

    .body-row {
      position: absolute;
      left: 12px;
      top: 216px;
      width: 575px;
      min-height: 644px;
      padding: 12px 12px 16px;
    }
    .title-en {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .title-ko {
      font-size: 11px;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .toc-text {
      font-size: 11px;
      line-height: 1.32;
      white-space: pre-line;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h2>좌표 동기화 고정판</h2>

      <div class="btn-row">
        <button id="runBtn" class="btn">정리/실행</button>
        <button id="sampleBtn" class="btn secondary">샘플 넣기</button>
        <button id="copyGuideBtn" class="btn">안내서 전체 복사</button>
        <button id="downloadWordBtn" class="btn secondary">워드 저장용 다운로드</button>
      </div>

      <div class="field">
        <label for="customerSelect">고객 선택</label>
        <select id="customerSelect">
          <option value="kric">한국화학연구원 / 광에너지연구센터</option>
          <option value="kimm">한국기계연구원 / 친환경에너지기계연구실</option>
        </select>
      </div>

      <div class="field">
        <label for="titleEn">영문 제목</label>
        <textarea id="titleEn"></textarea>
      </div>

      <div class="field">
        <label for="titleKo">한글 제목</label>
        <textarea id="titleKo"></textarea>
      </div>

      <div class="field">
        <label for="publisher">발행사</label>
        <input id="publisher" />
      </div>

      <div class="field">
        <label for="pages">페이지</label>
        <input id="pages" />
      </div>

      <div class="field">
        <label for="price">정가</label>
        <input id="price" />
      </div>

      <div class="field">
        <label for="publishDate">발행일</label>
        <input id="publishDate" />
      </div>

      <div class="field">
        <label for="pdfType">PDF 표기</label>
        <input id="pdfType" />
      </div>

      <div class="field">
        <label for="supplyPrice">공급가격</label>
        <input id="supplyPrice" />
      </div>

      <div class="field">
        <label for="reportLink">보고서 링크</label>
        <input id="reportLink" />
      </div>

      <div class="field">
        <label for="tocText">본문 / 목차</label>
        <textarea id="tocText"></textarea>
      </div>

      <div class="hint">
        생성 화면과 오류 화면이 같은 좌표를 함께 씁니다.<br>
        원본 파일은 <b>original-guide.png</b> 이름으로 같은 폴더에 있어야 합니다.
      </div>
    </div>

    <div class="preview-wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="renderTab">생성 화면</button>
        <button class="tab-btn" data-tab="debugTab">오류 화면</button>
      </div>

      <div id="renderTab" class="tab-pane active">
        <div class="preview-title">생성 화면</div>
        <div class="stage">
          <div class="guide-host">
            <div id="guideWrap" class="guide-block"></div>
          </div>
        </div>
      </div>

      <div id="debugTab" class="tab-pane">
        <div class="preview-title">오류 화면</div>
        <div class="legend">
          <span class="status-badge locked">잠금완료</span>
          <span class="status-badge hold">보류</span>
          <span class="status-badge manual">수동대기</span>
        </div>
        <div class="stage">
          <div class="compare-stage">
            <img class="origin" src="./original-guide.png" alt="원본 안내서">
            <div id="debugGuideWrap" style="position:absolute; inset:0; z-index:2; opacity:.18;"></div>
            <div id="overlayRoot" class="overlay-root"></div>
          </div>
        </div>
        <div id="debugRoot" class="debug-wrap"></div>
      </div>
    </div>
  </div>

  <script>
    const customers = {
      kric: { orgName: "한국화학연구원", deptName: "광에너지연구센터" },
      kimm: { orgName: "한국기계연구원", deptName: "친환경에너지기계연구실" }
    };

    const sample = {
      customerKey: "kric",
      titleEn: "",
      titleKo: "",
      publisher: "HNY Research",
      pages: "125 Pages",
      price: "$ 5,000",
      publishDate: "2026년 01월 02일",
      pdfType: "PDF",
      supplyPrice: "7,400,000원",
      reportLink: "https://www.hnyresearch.com/report/2026-2031-Global-Biocarbon-Outlook-Market-Size-Share-Trends-Analysis-Report-By-Player-Type-Application-and-Region-Enhanced-Version/3484731",
      tocText: ""
    };

    const AREAS = [
      {
        key: "HEADER.LEFT.BOX",
        area: "T1/S1/C3/W1/HEADER.LEFT.BOX",
        state: "locked",
        rect: { x: 12, y: 11, w: 282, h: 71 },
        value: () => "좌측 헤더 박스"
      },
      {
        key: "HEADER.RIGHT.BOX",
        area: "T1/S1/C3/W1/HEADER.RIGHT.BOX",
        state: "locked",
        rect: { x: 294, y: 11, w: 293, h: 71 },
        value: () => "우측 헤더 박스"
      },
      {
        key: "RECEIVER.LINE",
        area: "T1/S1/C3/W1/RECEIVER.LINE",
        state: "locked",
        rect: { x: 24, y: 108, w: 300, h: 24 },
        value: data => data.receiver
      },
      {
        key: "META.LEFT.TEXT.PUBLISHER",
        area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER",
        state: "locked",
        rect: { x: 44, y: 150, w: 194, h: 54 },
        value: data => data.publisher
      },
      {
        key: "META.CENTER.TEXT.PAGES",
        area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES",
        state: "hold",
        rect: { x: 280, y: 150, w: 96, h: 54 },
        value: data => data.pages
      },
      {
        key: "META.RIGHT.TEXT.PRICE",
        area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE",
        state: "manual",
        rect: { x: 422, y: 150, w: 132, h: 54 },
        value: data => data.price
      },
      {
        key: "LINK.TEXT",
        area: "T1/S1/C3/W1/LINK.TEXT",
        state: "hold",
        rect: { x: 40, y: 217, w: 500, h: 32 },
        value: data => data.reportLink
      },
      {
        key: "TITLE.EN",
        area: "T1/S1/C3/W1/TITLE.EN",
        state: "manual",
        rect: { x: 44, y: 304, w: 470, h: 72 },
        value: data => data.titleEn || "(비움)"
      },
      {
        key: "TITLE.KO",
        area: "T1/S1/C3/W1/TITLE.KO",
        state: "manual",
        rect: { x: 42, y: 379, w: 470, h: 38 },
        value: data => data.titleKo || "(비움)"
      },
      {
        key: "TOC.TEXT",
        area: "T1/S1/C3/W1/TOC.TEXT",
        state: "manual",
        rect: { x: 40, y: 452, w: 470, h: 176 },
        value: data => data.tocText ? data.tocText.split("\n")[0] : "(비움)"
      }
    ];

    const AREA_LABEL = {
      locked: "잠금완료",
      hold: "보류",
      manual: "수동대기"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getData() {
      const customerKey = document.getElementById("customerSelect").value;
      const customer = customers[customerKey];
      return {
        receiver: `( ${customer.orgName} ) ${customer.deptName}`,
        titleEn: document.getElementById("titleEn").value.trim(),
        titleKo: document.getElementById("titleKo").value.trim(),
        publisher: document.getElementById("publisher").value.trim(),
        pages: document.getElementById("pages").value.trim(),
        price: document.getElementById("price").value.trim(),
        publishDate: document.getElementById("publishDate").value.trim(),
        pdfType: document.getElementById("pdfType").value.trim(),
        supplyPrice: document.getElementById("supplyPrice").value.trim(),
        reportLink: document.getElementById("reportLink").value.trim(),
        tocText: document.getElementById("tocText").value.trim()
      };
    }

    function buildGuideHTML(data) {
      return `
<div id="mailGuideBlock" class="mail-guide">
  <div class="sheet-frame"></div>

  <div class="header-row">
    <div class="header-left">
      <div style="font-size:20px; font-weight:700; line-height:1.1; margin-bottom:4px;">신간자료안내</div>
      <div style="font-size:12px; font-weight:700; text-decoration:underline; line-height:1.1;">www.worldic.co.kr</div>
    </div>
    <div class="header-right">
      <div style="font-size:15px; font-weight:700; line-height:1.15;">(주)월드산업정보센터</div>
      <div style="font-size:9px; font-weight:700; line-height:1.15; margin-top:2px;">WORLD INDUSTRIAL INFORMATION CENTER</div>
      <div style="font-size:10px; line-height:1.3; margin-top:5px;">
        T:(02)333-8331 / F:(02)333-8330<br>
        E-mail : info@worldic.co.kr
      </div>
    </div>
  </div>

  <div class="receiver-line">
    수신 : ${escapeHtml(data.receiver)}
  </div>

  <div class="meta-row">
    <div class="meta-left">
      <div style="margin-bottom:4px;">◇ 발행사: ${escapeHtml(data.publisher)}</div>
      <div>◇ 발행일: ${escapeHtml(data.publishDate)}</div>
    </div>

    <div class="meta-center">
      <div style="margin-bottom:4px;">${escapeHtml(data.pages)}</div>
      <div>${escapeHtml(data.pdfType)}</div>
    </div>

    <div class="meta-right">
      <div style="margin-bottom:4px;">◇ 정가: ${escapeHtml(data.price)}</div>
      <div>◆ 공급가격: ${escapeHtml(data.supplyPrice)}</div>
    </div>
  </div>

  <div class="link-row">
    <div class="link-line-1">
      ● 보고서 링크 <a href="${escapeHtml(data.reportLink)}" style="color:#1d4ed8; text-decoration:underline;">[바로가기]</a>
    </div>
    <div class="link-line-2">${escapeHtml(data.reportLink)}</div>
  </div>

  <div class="body-row">
    ${data.titleEn ? `<div class="title-en">${escapeHtml(data.titleEn)}</div>` : ""}
    ${data.titleKo ? `<div class="title-ko">${escapeHtml(data.titleKo)}</div>` : ""}
    ${data.tocText ? `<div class="toc-text">${escapeHtml(data.tocText)}</div>` : ""}
  </div>
</div>`;
    }

    function buildDebugText(item, data) {
      return `위치 식별자: ${item.area}
구역명: ${item.key}
상태: ${AREA_LABEL[item.state]}
좌표: x=${item.rect.x}, y=${item.rect.y}, w=${item.rect.w}, h=${item.rect.h}
현재값: ${item.value(data)}`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("복사 완료");
      } catch (e) {
        alert(text);
      }
    }

    async function copyDebug(index) {
      const item = window.__debugItems[index];
      if (!item) return;
      const data = getData();
      await copyText(buildDebugText(item, data));
    }
    window.copyDebug = copyDebug;

    async function copyOverlay(area, key, state, rect) {
      await copyText(`위치 식별자: ${area}
구역명: ${key}
상태: ${AREA_LABEL[state]}
좌표: x=${rect.x}, y=${rect.y}, w=${rect.w}, h=${rect.h}`);
    }
    window.copyOverlay = copyOverlay;

    function renderDebug(data) {
      window.__debugItems = AREAS;

      document.getElementById("debugRoot").innerHTML = AREAS.map((item, idx) => `
        <div class="debug-card">
          <div class="debug-top">
            <div>
              <strong>${escapeHtml(item.key)}</strong><br>
              <span class="area-badge">${escapeHtml(item.area)}</span>
              <span class="status-badge ${item.state}">${AREA_LABEL[item.state]}</span>
            </div>
            <button class="btn secondary small" onclick="copyDebug(${idx})">복사</button>
          </div>
          <div class="copy-box">${escapeHtml(buildDebugText(item, data))}</div>
        </div>
      `).join("");

      document.getElementById("overlayRoot").innerHTML = AREAS.map(item => `
        <div class="overlay-box ${item.state}" style="left:${item.rect.x}px; top:${item.rect.y}px; width:${item.rect.w}px; height:${item.rect.h}px;">
          <div class="overlay-label">
            <span class="area-badge">${item.area}</span>
            <span class="status-badge ${item.state}">${AREA_LABEL[item.state]}</span>
            <button class="btn secondary small" onclick='copyOverlay("${item.area}","${item.key}","${item.state}",${JSON.stringify(item.rect)})'>복사</button>
          </div>
        </div>
      `).join("");
    }

    function renderAll() {
      const data = getData();
      const html = buildGuideHTML(data);
      document.getElementById("guideWrap").innerHTML = html;
      document.getElementById("debugGuideWrap").innerHTML = html;
      renderDebug(data);
    }

    async function copyGuideHTML() {
      const html = document.getElementById("guideWrap").innerHTML;
      const plain = document.getElementById("guideWrap").innerText;
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([plain], { type: "text/plain" })
          })
        ]);
        alert("안내서 전체 복사 완료");
      } catch (e) {
        alert("복사 실패");
      }
    }

    function downloadWordHTML() {
      const html = `
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>guide-save-for-word</title>
</head>
<body>${document.getElementById("guideWrap").innerHTML}</body>
</html>`.trim();

      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "guide-save-for-word.html";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function fillSample() {
      document.getElementById("customerSelect").value = sample.customerKey;
      document.getElementById("titleEn").value = sample.titleEn;
      document.getElementById("titleKo").value = sample.titleKo;
      document.getElementById("publisher").value = sample.publisher;
      document.getElementById("pages").value = sample.pages;
      document.getElementById("price").value = sample.price;
      document.getElementById("publishDate").value = sample.publishDate;
      document.getElementById("pdfType").value = sample.pdfType;
      document.getElementById("supplyPrice").value = sample.supplyPrice;
      document.getElementById("reportLink").value = sample.reportLink;
      document.getElementById("tocText").value = sample.tocText;
      renderAll();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.getElementById("runBtn").addEventListener("click", renderAll);
    document.getElementById("sampleBtn").addEventListener("click", fillSample);
    document.getElementById("copyGuideBtn").addEventListener("click", copyGuideHTML);
    document.getElementById("downloadWordBtn").addEventListener("click", downloadWordHTML);

    fillSample();
  </script>
</body>
</html>
