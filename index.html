<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1번 고객 자동화 안내서</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f8;
      color: #222;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 12px;
      padding: 12px;
    }
    .panel, .preview-wrap {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
    }
    .panel h2, .preview-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }
    .field select, .field textarea, .field input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    .field textarea {
      min-height: 84px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      border: 1px solid #c8cfdb;
      background: #1f6feb;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .btn.secondary {
      background: #fff;
      color: #1f2937;
    }
    .btn.small {
      padding: 4px 8px;
      font-size: 11px;
    }
    .hint {
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid #c8cfdb;
      background: #fff;
      color: #1f2937;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .tab-btn.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .mail-stage {
      background: #eef2f7;
      border-radius: 10px;
      padding: 16px;
    }

    .guide-wrap {
      width: 760px;
      margin: 0 auto;
      background: #fff;
    }

    .page-stage {
      background: #eef2f7;
      border-radius: 10px;
      padding: 16px;
      overflow: auto;
    }

    /* 원본 겹침 비교 */
    .compare-stage {
      position: relative;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #cfd6e2;
    }
    .origin-layer {
      position: absolute;
      inset: 0 auto auto 0;
      z-index: 3;
      opacity: 0.38;
      pointer-events: none;
      display: none;
    }
    .debug-guide-scale {
      position: absolute;
      inset: 0 auto auto 0;
      z-index: 2;
      transform-origin: top left;
      pointer-events: none;
    }
    .debug-guide-scale .guide-wrap {
      margin: 0;
      background: transparent;
    }
    .overlay-root {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .overlay-box {
      position: absolute;
      border: 2px solid rgba(239, 68, 68, 0.9);
      background: rgba(239, 68, 68, 0.06);
      border-radius: 6px;
      pointer-events: auto;
    }
    .overlay-label {
      position: absolute;
      top: -24px;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      pointer-events: auto;
    }
    .area-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ccd5e2;
      background: #f7f9fc;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ead08b;
      background: #fff8e8;
      color: #8b5a00;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .debug-card {
      border: 1px solid #d8dde6;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      background: #fbfcfe;
    }
    .debug-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .copy-box {
      background: #0f172a;
      color: #d7e0ea;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.45;
      margin-top: 8px;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .guide-wrap { width: 760px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h2>메일 발송용 / 워드 저장용</h2>

      <div class="btn-row">
        <button id="runBtn" class="btn">정리/실행</button>
        <button id="sampleBtn" class="btn secondary">샘플 넣기</button>
        <button id="copyMailBtn" class="btn">메일용 안내서 전체 복사</button>
        <button id="downloadWordBtn" class="btn secondary">워드 저장용 다운로드</button>
      </div>

      <div class="field">
        <label for="customerSelect">고객 선택</label>
        <select id="customerSelect">
          <option value="kric">한국화학연구원 / 광에너지연구센터</option>
          <option value="kimm">한국기계연구원 / 친환경에너지기계연구실</option>
        </select>
      </div>

      <div class="field">
        <label for="titleEn">영문 제목</label>
        <textarea id="titleEn"></textarea>
      </div>

      <div class="field">
        <label for="titleKo">한글 제목</label>
        <textarea id="titleKo"></textarea>
      </div>

      <div class="field">
        <label for="publisher">발행사</label>
        <input id="publisher" />
      </div>

      <div class="field">
        <label for="pages">페이지</label>
        <input id="pages" />
      </div>

      <div class="field">
        <label for="price">정가</label>
        <input id="price" />
      </div>

      <div class="field">
        <label for="publishDate">발행일</label>
        <input id="publishDate" />
      </div>

      <div class="field">
        <label for="pdfType">PDF 표기</label>
        <input id="pdfType" />
      </div>

      <div class="field">
        <label for="supplyPrice">공급가격</label>
        <input id="supplyPrice" />
      </div>

      <div class="field">
        <label for="reportLink">보고서 링크</label>
        <input id="reportLink" />
      </div>

      <div class="field">
        <label for="tocText">본문 / 목차</label>
        <textarea id="tocText"></textarea>
      </div>

      <div class="hint">
        같은 폴더에 <strong>original-guide.png</strong> 파일을 둡니다.<br>
        오류 화면에서는 원본 PNG가 생성 안내서 위에 반투명으로 보여야 정상입니다.
      </div>
    </div>

    <div class="preview-wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="renderTab">생성 화면</button>
        <button class="tab-btn" data-tab="debugTab">오류 화면</button>
      </div>

      <div id="renderTab" class="tab-pane active">
        <div class="preview-title">메일 발송용 안내서 미리보기</div>
        <div class="mail-stage">
          <div id="guideWrap" class="guide-wrap"></div>
        </div>
      </div>

      <div id="debugTab" class="tab-pane">
        <div class="preview-title">원본 겹침 비교 + 정밀 분류체계</div>
        <div class="page-stage">
          <div id="compareStage" class="compare-stage">
            <img id="originLayer" class="origin-layer" src="./original-guide.png" alt="원본 안내서">
            <div id="debugGuideScale" class="debug-guide-scale"></div>
            <div id="overlayRoot" class="overlay-root"></div>
          </div>
        </div>
        <div id="debugRoot"></div>
      </div>
    </div>
  </div>

  <script>
    const MAIL_WIDTH = 760;

    const customers = {
      kric: { orgName: "한국화학연구원", deptName: "광에너지연구센터" },
      kimm: { orgName: "한국기계연구원", deptName: "친환경에너지기계연구실" }
    };

    const sample = {
      customerKey: "kric",
      titleEn: "2026-2031 Global Biocarbon Outlook Market Size, Share & Trends Analysis Report By Player, Type, Application and Region Enhanced Version.",
      titleKo: "(글로벌 바이오 카본 시장 전망 보고서 2026-2031년: 시장 규모, 점유율 및 트렌드 분석 (플레이어, 유형, 응용 분야 및 지역별 향상 버전))",
      publisher: "HNY Research",
      pages: "125 Pages",
      price: "$ 5,000",
      publishDate: "2026년 01월 02일",
      pdfType: "PDF",
      supplyPrice: "7,400,000원",
      reportLink: "https://www.hnyresearch.com/report/2026-2031-Global-Biocarbon-Outlook-Market-Size-Share-Trends-Analysis-Report-By-Player-Type-Application-and-Region-Enhanced-Version/3484731",
      tocText:
`Report Overview
Market Competition by Manufacturers
Biocarbon Regional Market Analysis
Biocarbon Sales Market by Type (2020-2031)
5.1. Global Biocarbon Historic Market Size by Type (2020-2025)
5.2. Global Biocarbon Forecasted Market Size by Type (2026-2031)
Biocarbon Consumption Market by Application (2020-2031)
6.1. Global Biocarbon Historic Market Size by Application (2020-2025)
6.2. Global Biocarbon Forecasted Market Size by Application (2026-2031)
Company Profiles and Key Figures in Biocarbon Business
Production and Supply Forecast
8.1. Global Forecasted Production of Biocarbon (2026-2031)`
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getData() {
      const customerKey = document.getElementById("customerSelect").value;
      const customer = customers[customerKey];
      return {
        receiver: `( ${customer.orgName} ) ${customer.deptName}`,
        titleEn: document.getElementById("titleEn").value.trim(),
        titleKo: document.getElementById("titleKo").value.trim(),
        publisher: document.getElementById("publisher").value.trim(),
        pages: document.getElementById("pages").value.trim(),
        price: document.getElementById("price").value.trim(),
        publishDate: document.getElementById("publishDate").value.trim(),
        pdfType: document.getElementById("pdfType").value.trim(),
        supplyPrice: document.getElementById("supplyPrice").value.trim(),
        reportLink: document.getElementById("reportLink").value.trim(),
        tocText: document.getElementById("tocText").value.trim()
      };
    }

    function buildGuideHTML(data) {
      return `
<div id="mailGuideBlock" style="width:${MAIL_WIDTH}px; margin:0; background:#ffffff;">
  <table cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse; table-layout:fixed; font-family:Arial, sans-serif; color:#222; background:#fff;">
    <tr>
      <td colspan="3" style="padding:0 0 12px 0;">
        <table cellspacing="0" cellpadding="0" border="0" style="width:100%; border-collapse:collapse; table-layout:fixed;">
          <tr>
            <td style="width:58%; border:1px solid #222; text-align:center; padding:14px 10px;">
              <div style="font-size:22px; font-weight:700; line-height:1.2; margin-bottom:4px;">신간자료안내</div>
              <div style="font-size:13px; font-weight:700; text-decoration:underline; line-height:1.2;">www.worldic.co.kr</div>
            </td>
            <td style="width:42%; border:1px solid #222; text-align:center; padding:10px 8px;">
              <div style="font-size:16px; font-weight:700; line-height:1.2;">(주)월드산업정보센터</div>
              <div style="font-size:10px; font-weight:700; line-height:1.2; margin-top:2px;">WORLD INDUSTRIAL INFORMATION CENTER</div>
              <div style="font-size:11px; line-height:1.45; margin-top:6px;">
                T:(02)333-8331 / F:(02)333-8330<br>
                E-mail : info@worldic.co.kr
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <td colspan="3" style="border-left:1px solid #222; border-right:1px solid #222; border-top:1px solid #222; border-bottom:1px solid #999; padding:10px 14px; font-size:14px; font-weight:700; line-height:1.25;">
        수신 : ${escapeHtml(data.receiver)}
      </td>
    </tr>

    <tr>
      <td style="width:50%; border-left:1px solid #222; border-right:1px solid #999; border-bottom:1px solid #999; padding:8px 10px; vertical-align:top;">
        <div style="font-size:12px; line-height:1.45; margin-bottom:3px;">◇ 발행사: ${escapeHtml(data.publisher)}</div>
        <div style="font-size:12px; line-height:1.45;">◇ 발행일: ${escapeHtml(data.publishDate)}</div>
      </td>
      <td style="width:18%; border-right:1px solid #999; border-bottom:1px solid #999; padding:8px 10px; vertical-align:top; text-align:center;">
        <div style="font-size:12px; line-height:1.45; margin-bottom:3px;">${escapeHtml(data.pages)}</div>
        <div style="font-size:12px; line-height:1.45;">${escapeHtml(data.pdfType)}</div>
      </td>
      <td style="width:32%; border-right:1px solid #222; border-bottom:1px solid #999; padding:8px 10px; vertical-align:top;">
        <div style="font-size:12px; line-height:1.45; margin-bottom:3px;">◇ 정가: ${escapeHtml(data.price)}</div>
        <div style="font-size:12px; line-height:1.45;">◆ 공급가격: ${escapeHtml(data.supplyPrice)}</div>
      </td>
    </tr>

    <tr>
      <td colspan="3" style="border-left:1px solid #222; border-right:1px solid #222; border-bottom:1px solid #999; padding:8px 12px; vertical-align:top;">
        <div style="font-size:12px; line-height:1.35; word-break:break-all;">
          <span style="font-size:18px; vertical-align:top;">•</span>
          보고서 링크 :
          <a href="${escapeHtml(data.reportLink)}" style="color:#1d4ed8; text-decoration:underline;">${escapeHtml(data.reportLink)}</a>
        </div>
      </td>
    </tr>

    <tr>
      <td colspan="3" style="border-left:1px solid #222; border-right:1px solid #222; border-bottom:1px solid #222; padding:10px 12px 16px; vertical-align:top;">
        <div style="font-size:12px; line-height:1.4; margin-bottom:8px;">
          귀 기관의 연구 및 관심 분야와 관련된 시장 보고서를 아래와 같이 안내드립니다.
        </div>
        <div style="font-size:16px; font-weight:700; line-height:1.3; margin-bottom:6px;">
          ${escapeHtml(data.titleEn)}
        </div>
        <div style="font-size:11px; line-height:1.35; margin-bottom:8px;">
          ${escapeHtml(data.titleKo)}
        </div>
        <div style="font-size:11px; line-height:1.32; white-space:pre-line;">
${escapeHtml(data.tocText)}
        </div>
      </td>
    </tr>
  </table>
</div>`;
    }

    function buildDebugText(item) {
      return `분류코드: ${item.code}\n위치: ${item.area}\n상태: ${item.status}\n현재값: ${item.value}`;
    }

    function buildDebugItems(data) {
      return [
        { title: "HEADER.LEFT.BOX", area: "T1/S1/C3/W1/HEADER.LEFT.BOX", code: "HEADER.LEFT.BOX", status: "RULE_UPGRADEABLE", value: "좌측 헤더 박스" },
        { title: "HEADER.RIGHT.BOX", area: "T1/S1/C3/W1/HEADER.RIGHT.BOX", code: "HEADER.RIGHT.BOX", status: "RULE_UPGRADEABLE", value: "우측 헤더 박스" },
        { title: "RECEIVER.LINE", area: "T1/S1/C3/W1/RECEIVER.LINE", code: "RECEIVER.LINE", status: "RULE_UPGRADEABLE", value: data.receiver },
        { title: "META.LEFT.TEXT.PUBLISHER", area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER", code: "META.LEFT.TEXT.PUBLISHER", status: "RULE_UPGRADEABLE", value: data.publisher },
        { title: "META.CENTER.TEXT.PAGES", area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES", code: "META.CENTER.TEXT.PAGES", status: "RULE_UPGRADEABLE", value: data.pages },
        { title: "META.RIGHT.TEXT.PRICE", area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE", code: "META.RIGHT.TEXT.PRICE", status: "RULE_UPGRADEABLE", value: data.price },
        { title: "LINK.TEXT", area: "T1/S1/C3/W1/LINK.TEXT", code: "LINK.TEXT", status: "RULE_UPGRADEABLE", value: data.reportLink },
        { title: "TITLE.EN", area: "T1/S1/C3/W1/TITLE.EN", code: "TITLE.EN", status: "RULE_UPGRADEABLE", value: data.titleEn },
        { title: "TITLE.KO", area: "T1/S1/C3/W1/TITLE.KO", code: "TITLE.KO", status: "RULE_UPGRADEABLE", value: data.titleKo },
        { title: "TOC.TEXT", area: "T1/S1/C3/W1/TOC.TEXT", code: "TOC.TEXT", status: "RULE_UPGRADEABLE", value: data.tocText.split("\n")[0] || "" }
      ];
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("복사 완료");
      } catch (e) {
        alert(text);
      }
    }

    async function copyDebug(index) {
      const item = window.__debugItems[index];
      if (!item) return;
      await copyText(buildDebugText(item));
    }
    window.copyDebug = copyDebug;

    async function copyOverlay(area, title) {
      await copyText(`위치 식별자: ${area}\n구역명: ${title}\n최근 동작: 정리/실행`);
    }
    window.copyOverlay = copyOverlay;

    async function copyGuideForMail() {
      const html = buildGuideHTML(getData());
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([html.replace(/<[^>]+>/g, "")], { type: "text/plain" })
          })
        ]);
        alert("메일용 안내서 전체 복사 완료");
      } catch (e) {
        alert("복사 실패");
      }
    }

    function downloadWordHTML() {
      const html = `
<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>guide-save-for-word</title></head>
<body>${buildGuideHTML(getData())}</body>
</html>`.trim();

      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "guide-save-for-word.html";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function renderDebug(data) {
      const items = buildDebugItems(data);
      window.__debugItems = items;

      document.getElementById("debugRoot").innerHTML = items.map((item, idx) => `
        <div class="debug-card">
          <div class="debug-top">
            <div>
              <strong>${escapeHtml(item.title)}</strong><br>
              <span class="area-badge">${escapeHtml(item.area)}</span>
              <span class="status-badge">${item.status}</span>
            </div>
            <button class="btn secondary small" onclick="copyDebug(${idx})">복사</button>
          </div>
          <div>분류코드: ${escapeHtml(item.code)}</div>
          <div>현재값: ${escapeHtml(item.value)}</div>
          <div class="copy-box">${escapeHtml(buildDebugText(item))}</div>
        </div>
      `).join("");
    }

    function renderOverlay(scale) {
      const base = [
        { title: "HEADER.LEFT.BOX", area: "T1/S1/C3/W1/HEADER.LEFT.BOX", x: 0, y: 0, w: 441, h: 91 },
        { title: "HEADER.RIGHT.BOX", area: "T1/S1/C3/W1/HEADER.RIGHT.BOX", x: 441, y: 0, w: 319, h: 91 },
        { title: "RECEIVER.LINE", area: "T1/S1/C3/W1/RECEIVER.LINE", x: 0, y: 103, w: 760, h: 53 },
        { title: "META.LEFT.TEXT.PUBLISHER", area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER", x: 0, y: 156, w: 380, h: 71 },
        { title: "META.CENTER.TEXT.PAGES", area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES", x: 380, y: 156, w: 137, h: 71 },
        { title: "META.RIGHT.TEXT.PRICE", area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE", x: 517, y: 156, w: 243, h: 71 },
        { title: "LINK.TEXT", area: "T1/S1/C3/W1/LINK.TEXT", x: 0, y: 227, w: 760, h: 54 },
        { title: "TITLE.EN", area: "T1/S1/C3/W1/TITLE.EN", x: 12, y: 315, w: 736, h: 74 },
        { title: "TITLE.KO", area: "T1/S1/C3/W1/TITLE.KO", x: 12, y: 389, w: 736, h: 38 },
        { title: "TOC.TEXT", area: "T1/S1/C3/W1/TOC.TEXT", x: 12, y: 427, w: 736, h: 250 }
      ];

      const html = base.map(o => `
        <div class="overlay-box" style="
          left:${o.x * scale}px;
          top:${o.y * scale}px;
          width:${o.w * scale}px;
          height:${o.h * scale}px;
        ">
          <div class="overlay-label">
            <span class="area-badge">${o.area}</span>
            <span class="status-badge">${o.title}</span>
            <button class="btn secondary small" onclick="copyOverlay('${o.area}','${o.title}')">복사</button>
          </div>
        </div>
      `).join("");

      document.getElementById("overlayRoot").innerHTML = html;
    }

    function syncDebugStage() {
      const origin = document.getElementById("originLayer");
      const stage = document.getElementById("compareStage");
      const debugScale = document.getElementById("debugGuideScale");

      const originWidth = origin.naturalWidth || 599;
      const originHeight = origin.naturalHeight || 871;
      const scale = originWidth / MAIL_WIDTH;

      stage.style.width = originWidth + "px";
      stage.style.height = originHeight + "px";

      origin.style.display = "block";
      origin.style.width = originWidth + "px";
      origin.style.height = originHeight + "px";

      debugScale.style.transform = `scale(${scale})`;
      debugScale.style.width = MAIL_WIDTH + "px";
      debugScale.style.height = "0px";

      renderOverlay(scale);
    }

    function renderAll() {
      const data = getData();
      const html = buildGuideHTML(data);
      document.getElementById("guideWrap").innerHTML = html;
      document.getElementById("debugGuideScale").innerHTML = html;
      renderDebug(data);
      syncDebugStage();
    }

    function fillSample() {
      document.getElementById("customerSelect").value = sample.customerKey;
      document.getElementById("titleEn").value = sample.titleEn;
      document.getElementById("titleKo").value = sample.titleKo;
      document.getElementById("publisher").value = sample.publisher;
      document.getElementById("pages").value = sample.pages;
      document.getElementById("price").value = sample.price;
      document.getElementById("publishDate").value = sample.publishDate;
      document.getElementById("pdfType").value = sample.pdfType;
      document.getElementById("supplyPrice").value = sample.supplyPrice;
      document.getElementById("reportLink").value = sample.reportLink;
      document.getElementById("tocText").value = sample.tocText;
      renderAll();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.getElementById("runBtn").addEventListener("click", renderAll);
    document.getElementById("sampleBtn").addEventListener("click", fillSample);
    document.getElementById("copyMailBtn").addEventListener("click", copyGuideForMail);
    document.getElementById("downloadWordBtn").addEventListener("click", downloadWordHTML);

    document.getElementById("originLayer").addEventListener("load", syncDebugStage);
    document.getElementById("originLayer").addEventListener("error", function() {
      this.style.display = "none";
      const stage = document.getElementById("compareStage");
      stage.style.width = MAIL_WIDTH + "px";
      stage.style.height = "980px";
      document.getElementById("debugGuideScale").style.transform = "scale(1)";
      renderOverlay(1);
    });

    fillSample();
  </script>
</body>
</html>
