<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1번 고객 자동화 안내서 - 반자동 잠금판</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f8;
      color: #222;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 12px;
      padding: 12px;
    }
    .panel, .preview-wrap {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
    }
    .panel h2, .preview-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }
    .field select, .field textarea, .field input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    .field textarea {
      min-height: 84px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      border: 1px solid #c8cfdb;
      background: #1f6feb;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .btn.secondary {
      background: #fff;
      color: #1f2937;
    }
    .btn.small {
      padding: 4px 8px;
      font-size: 11px;
    }
    .hint {
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
      margin-top: 8px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid #c8cfdb;
      background: #fff;
      color: #1f2937;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .tab-btn.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .stage {
      background: #eef2f7;
      border-radius: 10px;
      padding: 16px;
    }
    .canvas-host {
      width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d5dbe6;
      padding: 16px;
    }
    .canvas-wrap {
      width: 599px;
      margin: 0 auto;
      position: relative;
    }
    canvas.main-canvas,
    canvas.debug-overlay {
      display: block;
      width: 599px;
      height: 871px;
      background: #fff;
    }

    .compare-wrap {
      width: 599px;
      height: 871px;
      margin: 0 auto;
      position: relative;
      background: #fff;
      border: 1px solid #d5dbe6;
    }
    .compare-wrap img.origin {
      position: absolute;
      inset: 0;
      width: 599px;
      height: 871px;
      opacity: 0.52;
      z-index: 1;
      pointer-events: none;
    }
    .compare-wrap canvas.debug-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.82;
      pointer-events: none;
      background: transparent;
    }
    .overlay-root {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .overlay-box {
      position: absolute;
      border: 2px solid;
      border-radius: 6px;
      pointer-events: auto;
      background: rgba(255,255,255,0.04);
    }
    .overlay-box.locked {
      border-color: rgba(22, 163, 74, 0.95);
      background: rgba(22, 163, 74, 0.08);
    }
    .overlay-box.hold {
      border-color: rgba(234, 179, 8, 0.95);
      background: rgba(234, 179, 8, 0.08);
    }
    .overlay-box.manual {
      border-color: rgba(249, 115, 22, 0.95);
      background: rgba(249, 115, 22, 0.08);
    }
    .overlay-label {
      position: absolute;
      top: -24px;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      pointer-events: auto;
    }
    .area-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ccd5e2;
      background: #f7f9fc;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      border: 1px solid;
    }
    .status-badge.locked {
      background: #ecfdf3;
      border-color: #86efac;
      color: #166534;
    }
    .status-badge.hold {
      background: #fefce8;
      border-color: #fde68a;
      color: #854d0e;
    }
    .status-badge.manual {
      background: #fff7ed;
      border-color: #fdba74;
      color: #9a3412;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .debug-wrap { margin-top: 12px; }
    .debug-card {
      border: 1px solid #d8dde6;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fbfcfe;
    }
    .debug-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .copy-box {
      background: #0f172a;
      color: #d7e0ea;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.45;
      margin-top: 8px;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h2>반자동 잠금판</h2>

      <div class="btn-row">
        <button id="runBtn" class="btn">정리/실행</button>
        <button id="sampleBtn" class="btn secondary">샘플 넣기</button>
        <button id="copyImageBtn" class="btn">안내서 전체 복사</button>
        <button id="downloadPngBtn" class="btn secondary">PNG 저장</button>
      </div>

      <div class="field">
        <label for="customerSelect">고객 선택</label>
        <select id="customerSelect">
          <option value="kric">한국화학연구원 / 광에너지연구센터</option>
          <option value="kimm">한국기계연구원 / 친환경에너지기계연구실</option>
        </select>
      </div>

      <div class="field">
        <label for="titleEn">영문 제목</label>
        <textarea id="titleEn"></textarea>
      </div>

      <div class="field">
        <label for="titleKo">한글 제목</label>
        <textarea id="titleKo"></textarea>
      </div>

      <div class="field">
        <label for="publisher">발행사</label>
        <input id="publisher" />
      </div>

      <div class="field">
        <label for="pages">페이지</label>
        <input id="pages" />
      </div>

      <div class="field">
        <label for="price">정가</label>
        <input id="price" />
      </div>

      <div class="field">
        <label for="publishDate">발행일</label>
        <input id="publishDate" />
      </div>

      <div class="field">
        <label for="pdfType">PDF 표기</label>
        <input id="pdfType" />
      </div>

      <div class="field">
        <label for="supplyPrice">공급가격</label>
        <input id="supplyPrice" />
      </div>

      <div class="field">
        <label for="reportLink">보고서 링크</label>
        <input id="reportLink" />
      </div>

      <div class="field">
        <label for="tocText">본문 / 목차</label>
        <textarea id="tocText"></textarea>
      </div>

      <div class="hint">
        생성 화면은 현재 사용 가능한 반자동판입니다.<br>
        오류 화면에서 녹색은 잠금, 노랑은 보류, 주황은 수동대기입니다.
      </div>
    </div>

    <div class="preview-wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="renderTab">생성 화면</button>
        <button class="tab-btn" data-tab="debugTab">오류 화면</button>
      </div>

      <div id="renderTab" class="tab-pane active">
        <div class="preview-title">생성 화면</div>
        <div class="stage">
          <div class="canvas-host">
            <div class="canvas-wrap">
              <canvas id="mainCanvas" class="main-canvas" width="599" height="871"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div id="debugTab" class="tab-pane">
        <div class="preview-title">오류 화면</div>
        <div class="legend">
          <span class="status-badge locked">잠금완료</span>
          <span class="status-badge hold">보류</span>
          <span class="status-badge manual">수동대기</span>
        </div>
        <div class="stage">
          <div class="compare-wrap">
            <img class="origin" src="./original-guide.png" alt="원본 안내서">
            <canvas id="debugCanvas" class="debug-overlay" width="599" height="871"></canvas>
            <div id="overlayRoot" class="overlay-root"></div>
          </div>
        </div>
        <div id="debugRoot" class="debug-wrap"></div>
      </div>
    </div>
  </div>

  <script>
    const W = 599;
    const H = 871;

    const customers = {
      kric: { orgName: "한국화학연구원", deptName: "광에너지연구센터" },
      kimm: { orgName: "한국기계연구원", deptName: "친환경에너지기계연구실" }
    };

    const sample = {
      customerKey: "kric",
      titleEn: "",
      titleKo: "",
      publisher: "HNY Research",
      pages: "125 Pages",
      price: "$ 5,000",
      publishDate: "2026년 01월 02일",
      pdfType: "PDF",
      supplyPrice: "7,400,000원",
      reportLink: "https://www.hnyresearch.com/report/2026-2031-Global-Biocarbon-Outlook-Market-Size-Share-Trends-Analysis-Report-By-Player-Type-Application-and-Region-Enhanced-Version/3484731",
      tocText: ""
    };

    const SLOTS = {
      "HEADER.LEFT.BOX":          { x: 12,  y: 11,  w: 282, h: 71 },
      "HEADER.RIGHT.BOX":         { x: 294, y: 11,  w: 293, h: 71 },
      "RECEIVER.LINE":            { x: 24,  y: 108, w: 300, h: 24 },

      "META.LEFT.TEXT.PUBLISHER": { x: 52,  y: 158, w: 178, h: 18 },
      "META.LEFT.TEXT.DATE":      { x: 52,  y: 180, w: 178, h: 18 },

      "META.CENTER.TEXT.PAGES":   { x: 289, y: 155, w: 86,  h: 18 },
      "META.CENTER.TEXT.PDF":     { x: 289, y: 178, w: 86,  h: 18 },

      "META.RIGHT.TEXT.PRICE":    { x: 432, y: 155, w: 118, h: 18 },
      "META.RIGHT.TEXT.SUPPLY":   { x: 432, y: 178, w: 118, h: 18 },

      "LINK.TEXT":                { x: 215, y: 248, w: 315, h: 20 },

      "TITLE.EN":                 { x: 44,  y: 304, w: 470, h: 72 },
      "TITLE.KO":                 { x: 42,  y: 379, w: 470, h: 38 },
      "TOC.TEXT":                 { x: 40,  y: 452, w: 470, h: 176 }
    };

    const AREA_STATE = {
      "HEADER.LEFT.BOX": "locked",
      "HEADER.RIGHT.BOX": "locked",
      "RECEIVER.LINE": "locked",
      "META.LEFT.TEXT.PUBLISHER": "locked",
      "META.LEFT.TEXT.DATE": "locked",
      "META.CENTER.TEXT.PAGES": "hold",
      "META.CENTER.TEXT.PDF": "hold",
      "META.RIGHT.TEXT.PRICE": "manual",
      "META.RIGHT.TEXT.SUPPLY": "manual",
      "LINK.TEXT": "hold",
      "TITLE.EN": "manual",
      "TITLE.KO": "manual",
      "TOC.TEXT": "manual"
    };

    const AREA_LABEL = {
      locked: "잠금완료",
      hold: "보류",
      manual: "수동대기"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getData() {
      const customerKey = document.getElementById("customerSelect").value;
      const customer = customers[customerKey];
      return {
        receiver: `( ${customer.orgName} ) ${customer.deptName}`,
        titleEn: document.getElementById("titleEn").value.trim(),
        titleKo: document.getElementById("titleKo").value.trim(),
        publisher: document.getElementById("publisher").value.trim(),
        pages: document.getElementById("pages").value.trim(),
        price: document.getElementById("price").value.trim(),
        publishDate: document.getElementById("publishDate").value.trim(),
        pdfType: document.getElementById("pdfType").value.trim(),
        supplyPrice: document.getElementById("supplyPrice").value.trim(),
        reportLink: document.getElementById("reportLink").value.trim(),
        tocText: document.getElementById("tocText").value.trim()
      };
    }

    function drawWrappedText(ctx, text, rect, style = {}) {
      const {
        font = "12px Arial",
        color = "#111",
        lineHeight = 16,
        underline = false,
        maxLines = 99,
        align = "left"
      } = style;

      ctx.save();
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.textAlign = align;
      ctx.textBaseline = "top";

      const words = String(text || "").split(/\s+/);
      const lines = [];
      let current = "";

      for (const word of words) {
        const test = current ? current + " " + word : word;
        const w = ctx.measureText(test).width;
        if (w <= rect.w || !current) current = test;
        else {
          lines.push(current);
          current = word;
        }
      }
      if (current) lines.push(current);

      let x = rect.x;
      if (align === "center") x = rect.x + rect.w / 2;
      if (align === "right") x = rect.x + rect.w;

      for (let i = 0; i < Math.min(lines.length, maxLines); i++) {
        const y = rect.y + i * lineHeight;
        if (y > rect.y + rect.h - lineHeight) break;
        ctx.fillText(lines[i], x, y);

        if (underline) {
          const metrics = ctx.measureText(lines[i]);
          let ux = x;
          if (align === "center") ux = x - metrics.width / 2;
          if (align === "right") ux = x - metrics.width;
          ctx.beginPath();
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.moveTo(ux, y + lineHeight - 2);
          ctx.lineTo(ux + metrics.width, y + lineHeight - 2);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawMultilineByBreak(ctx, text, rect, style = {}) {
      const {
        font = "12px Arial",
        color = "#111",
        lineHeight = 16
      } = style;

      ctx.save();
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.textBaseline = "top";

      const lines = String(text || "").split("\n");
      for (let i = 0; i < lines.length; i++) {
        const y = rect.y + i * lineHeight;
        if (y > rect.y + rect.h - lineHeight) break;
        ctx.fillText(lines[i], rect.x, y);
      }
      ctx.restore();
    }

    function drawGuide(ctx, img, data) {
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(img, 0, 0, W, H);

      drawWrappedText(ctx, data.receiver, SLOTS["RECEIVER.LINE"], {
        font: "700 15px Arial",
        color: "#111",
        lineHeight: 18,
        maxLines: 1
      });

      drawWrappedText(ctx, `◇ 발행사: ${data.publisher}`, SLOTS["META.LEFT.TEXT.PUBLISHER"], {
        font: "11px Arial",
        color: "#111",
        lineHeight: 13,
        maxLines: 1
      });

      drawWrappedText(ctx, `◇ 발행일: ${data.publishDate}`, SLOTS["META.LEFT.TEXT.DATE"], {
        font: "11px Arial",
        color: "#111",
        lineHeight: 13,
        maxLines: 1
      });

      drawWrappedText(ctx, data.pages, SLOTS["META.CENTER.TEXT.PAGES"], {
        font: "11px Arial",
        color: "#111",
        lineHeight: 13,
        maxLines: 1,
        align: "center"
      });

      drawWrappedText(ctx, data.pdfType, SLOTS["META.CENTER.TEXT.PDF"], {
        font: "11px Arial",
        color: "#111",
        lineHeight: 13,
        maxLines: 1,
        align: "center"
      });

      drawWrappedText(ctx, `◇ 정가: ${data.price}`, SLOTS["META.RIGHT.TEXT.PRICE"], {
        font: "11px Arial",
        color: "#111",
        lineHeight: 13,
        maxLines: 1
      });

      drawWrappedText(ctx, `◆ 공급가격: ${data.supplyPrice}`, SLOTS["META.RIGHT.TEXT.SUPPLY"], {
        font: "11px Arial",
        color: "#111",
        lineHeight: 13,
        maxLines: 1
      });

      drawWrappedText(ctx, data.reportLink, SLOTS["LINK.TEXT"], {
        font: "11px Arial",
        color: "#1d4ed8",
        lineHeight: 13,
        maxLines: 2,
        underline: true
      });

      if (data.titleEn) {
        drawWrappedText(ctx, data.titleEn, SLOTS["TITLE.EN"], {
          font: "700 16px Arial",
          color: "#111",
          lineHeight: 20,
          maxLines: 3
        });
      }

      if (data.titleKo) {
        drawWrappedText(ctx, data.titleKo, SLOTS["TITLE.KO"], {
          font: "11px Arial",
          color: "#111",
          lineHeight: 13,
          maxLines: 3
        });
      }

      if (data.tocText) {
        drawMultilineByBreak(ctx, data.tocText, SLOTS["TOC.TEXT"], {
          font: "10px Arial",
          color: "#111",
          lineHeight: 13
        });
      }
    }

    function buildDebugItems(data) {
      return [
        { key: "HEADER.LEFT.BOX", title: "HEADER.LEFT.BOX", area: "T1/S1/C3/W1/HEADER.LEFT.BOX", code: "HEADER.LEFT.BOX", value: JSON.stringify(SLOTS["HEADER.LEFT.BOX"]) },
        { key: "HEADER.RIGHT.BOX", title: "HEADER.RIGHT.BOX", area: "T1/S1/C3/W1/HEADER.RIGHT.BOX", code: "HEADER.RIGHT.BOX", value: JSON.stringify(SLOTS["HEADER.RIGHT.BOX"]) },
        { key: "RECEIVER.LINE", title: "RECEIVER.LINE", area: "T1/S1/C3/W1/RECEIVER.LINE", code: "RECEIVER.LINE", value: data.receiver },
        { key: "META.LEFT.TEXT.PUBLISHER", title: "META.LEFT.TEXT.PUBLISHER", area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER", code: "META.LEFT.TEXT.PUBLISHER", value: data.publisher },
        { key: "META.CENTER.TEXT.PAGES", title: "META.CENTER.TEXT.PAGES", area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES", code: "META.CENTER.TEXT.PAGES", value: data.pages },
        { key: "META.RIGHT.TEXT.PRICE", title: "META.RIGHT.TEXT.PRICE", area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE", code: "META.RIGHT.TEXT.PRICE", value: data.price },
        { key: "LINK.TEXT", title: "LINK.TEXT", area: "T1/S1/C3/W1/LINK.TEXT", code: "LINK.TEXT", value: data.reportLink },
        { key: "TITLE.EN", title: "TITLE.EN", area: "T1/S1/C3/W1/TITLE.EN", code: "TITLE.EN", value: data.titleEn || "(비움)" },
        { key: "TITLE.KO", title: "TITLE.KO", area: "T1/S1/C3/W1/TITLE.KO", code: "TITLE.KO", value: data.titleKo || "(비움)" },
        { key: "TOC.TEXT", title: "TOC.TEXT", area: "T1/S1/C3/W1/TOC.TEXT", code: "TOC.TEXT", value: data.tocText ? data.tocText.split("\n")[0] : "(비움)" }
      ].map(item => ({
        ...item,
        status: AREA_STATE[item.key]
      }));
    }

    function buildDebugText(item) {
      return `분류코드: ${item.code}
위치: ${item.area}
상태: ${AREA_LABEL[item.status]}
현재값: ${item.value}`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("복사 완료");
      } catch (e) {
        alert(text);
      }
    }

    async function copyDebug(index) {
      const item = window.__debugItems[index];
      if (!item) return;
      await copyText(buildDebugText(item));
    }
    window.copyDebug = copyDebug;

    async function copyOverlay(area, title, rect, status) {
      await copyText(`위치 식별자: ${area}
구역명: ${title}
상태: ${AREA_LABEL[status]}
좌표: x=${rect.x}, y=${rect.y}, w=${rect.w}, h=${rect.h}
최근 동작: 정리/실행`);
    }
    window.copyOverlay = copyOverlay;

    function renderDebug(data) {
      const items = buildDebugItems(data);
      window.__debugItems = items;

      document.getElementById("debugRoot").innerHTML = items.map((item, idx) => `
        <div class="debug-card">
          <div class="debug-top">
            <div>
              <strong>${escapeHtml(item.title)}</strong><br>
              <span class="area-badge">${escapeHtml(item.area)}</span>
              <span class="status-badge ${item.status}">${AREA_LABEL[item.status]}</span>
            </div>
            <button class="btn secondary small" onclick="copyDebug(${idx})">복사</button>
          </div>
          <div>분류코드: ${escapeHtml(item.code)}</div>
          <div>현재값: ${escapeHtml(item.value)}</div>
          <div class="copy-box">${escapeHtml(buildDebugText(item))}</div>
        </div>
      `).join("");

      const overlayItems = [
        { key: "HEADER.LEFT.BOX", area: "T1/S1/C3/W1/HEADER.LEFT.BOX", rect: SLOTS["HEADER.LEFT.BOX"] },
        { key: "HEADER.RIGHT.BOX", area: "T1/S1/C3/W1/HEADER.RIGHT.BOX", rect: SLOTS["HEADER.RIGHT.BOX"] },
        { key: "RECEIVER.LINE", area: "T1/S1/C3/W1/RECEIVER.LINE", rect: SLOTS["RECEIVER.LINE"] },
        { key: "META.LEFT.TEXT.PUBLISHER", area: "T1/S1/C3/W1/META.LEFT.TEXT.PUBLISHER", rect: { x: 44, y: 150, w: 194, h: 54 } },
        { key: "META.CENTER.TEXT.PAGES", area: "T1/S1/C3/W1/META.CENTER.TEXT.PAGES", rect: { x: 280, y: 150, w: 96, h: 54 } },
        { key: "META.RIGHT.TEXT.PRICE", area: "T1/S1/C3/W1/META.RIGHT.TEXT.PRICE", rect: { x: 422, y: 150, w: 132, h: 54 } },
        { key: "LINK.TEXT", area: "T1/S1/C3/W1/LINK.TEXT", rect: { x: 40, y: 217, w: 500, h: 32 } },
        { key: "TITLE.EN", area: "T1/S1/C3/W1/TITLE.EN", rect: SLOTS["TITLE.EN"] },
        { key: "TITLE.KO", area: "T1/S1/C3/W1/TITLE.KO", rect: SLOTS["TITLE.KO"] },
        { key: "TOC.TEXT", area: "T1/S1/C3/W1/TOC.TEXT", rect: SLOTS["TOC.TEXT"] }
      ];

      document.getElementById("overlayRoot").innerHTML = overlayItems.map(o => {
        const status = AREA_STATE[o.key];
        return `
          <div class="overlay-box ${status}" style="left:${o.rect.x}px; top:${o.rect.y}px; width:${o.rect.w}px; height:${o.rect.h}px;">
            <div class="overlay-label">
              <span class="area-badge">${o.area}</span>
              <span class="status-badge ${status}">${AREA_LABEL[status]}</span>
              <button class="btn secondary small" onclick='copyOverlay("${o.area}","${o.key}",${JSON.stringify(o.rect)},"${status}")'>복사</button>
            </div>
          </div>
        `;
      }).join("");
    }

    let templateImage = null;

    async function loadTemplate() {
      if (templateImage) return templateImage;
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = "./original-guide.png";
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });
      templateImage = img;
      return img;
    }

    async function renderAll() {
      const data = getData();
      const img = await loadTemplate();

      const mainCanvas = document.getElementById("mainCanvas");
      const mainCtx = mainCanvas.getContext("2d");
      drawGuide(mainCtx, img, data);

      const debugCanvas = document.getElementById("debugCanvas");
      const debugCtx = debugCanvas.getContext("2d");
      drawGuide(debugCtx, img, data);

      renderDebug(data);
    }

    function fillSample() {
      document.getElementById("customerSelect").value = sample.customerKey;
      document.getElementById("titleEn").value = sample.titleEn;
      document.getElementById("titleKo").value = sample.titleKo;
      document.getElementById("publisher").value = sample.publisher;
      document.getElementById("pages").value = sample.pages;
      document.getElementById("price").value = sample.price;
      document.getElementById("publishDate").value = sample.publishDate;
      document.getElementById("pdfType").value = sample.pdfType;
      document.getElementById("supplyPrice").value = sample.supplyPrice;
      document.getElementById("reportLink").value = sample.reportLink;
      document.getElementById("tocText").value = sample.tocText;
      renderAll();
    }

    async function canvasToBlob(canvas) {
      return await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    async function copyGuideImage() {
      try {
        const blob = await canvasToBlob(document.getElementById("mainCanvas"));
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]);
        alert("안내서 전체 복사 완료");
      } catch (e) {
        alert("복사 실패");
      }
    }

    async function downloadPng() {
      try {
        const blob = await canvasToBlob(document.getElementById("mainCanvas"));
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "guide-mail-image.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert("PNG 저장 실패");
      }
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.getElementById("runBtn").addEventListener("click", renderAll);
    document.getElementById("sampleBtn").addEventListener("click", fillSample);
    document.getElementById("copyImageBtn").addEventListener("click", copyGuideImage);
    document.getElementById("downloadPngBtn").addEventListener("click", downloadPng);

    loadTemplate().then(fillSample);
  </script>
</body>
</html>
